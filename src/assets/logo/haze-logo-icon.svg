<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF8C33"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="60,6 108,30 108,90 60,114 12,90 12,30"
    fill="#040D1A" stroke="url(#glow)" stroke-width="2.5"/>

  <!-- Inner circuit lines (tech aesthetic) -->
  <line x1="35" y1="45" x2="35" y2="75" stroke="#00CFFF" stroke-width="1" opacity="0.3"/>
  <line x1="85" y1="45" x2="85" y2="75" stroke="#00CFFF" stroke-width="1" opacity="0.3"/>
  <circle cx="35" cy="45" r="2" fill="#00CFFF" opacity="0.4"/>
  <circle cx="35" cy="75" r="2" fill="#00CFFF" opacity="0.4"/>
  <circle cx="85" cy="45" r="2" fill="#00CFFF" opacity="0.4"/>
  <circle cx="85" cy="75" r="2" fill="#00CFFF" opacity="0.4"/>

  <!-- H letter -->
  <g filter="url(#glow-filter)">
    <path d="M42 38 L42 82 M42 60 L78 60 M78 38 L78 82"
      stroke="url(#glow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Orange accent dot -->
  <circle cx="92" cy="34" r="4" fill="url(#accent)" opacity="0.9"/>
</svg>
