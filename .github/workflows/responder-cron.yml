name: Scheduled responder + status crons

# Vercel's built-in cron scheduler proved unreliable for the */5 jobs (missed
# many ticks), so we drive them from GitHub Actions instead. The endpoints are
# idempotent (claim-before-send dedup), so this is safe to run alongside any
# Vercel cron. Authenticated with the CRON_SECRET repo secret (same value as the
# CRON_SECRET env var on Vercel).
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Email auto-responder
        run: |
          curl -sS -m 70 -o /dev/null -w "email-autoresponder: %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.hazetechsolutions.com/api/website?action=cron-email-autoresponder"
      - name: Notification status watcher
        run: |
          curl -sS -m 70 -o /dev/null -w "notify-status: %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.hazetechsolutions.com/api/website?action=cron-notify-status"
      - name: Brand-kit resume watchdog
        run: |
          curl -sS -m 70 -o /dev/null -w "brand-kit-resume: %{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.hazetechsolutions.com/api/website?action=cron-brand-kit-resume"
